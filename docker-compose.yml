# docker-compose.yml — SMIA HU-07
# Stack: Laravel (PHP 8.3) + PostgreSQL 16 + Angular (Node 20) + Nginx

version: '3.9'

services:

  # ─────────────────────────────────────────────
  # Base de Datos — PostgreSQL 16
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: smia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-smia_gamlp}
      POSTGRES_USER:     ${DB_USERNAME:-smia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smia_secret}
    volumes:
      - smia_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-smia_user} -d ${DB_DATABASE:-smia_gamlp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smia_net

  # ─────────────────────────────────────────────
  # Backend — Laravel 11 / PHP 8.3
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: smia_backend
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV:          local
      APP_KEY:          ${APP_KEY}
      APP_DEBUG:        "true"
      DB_CONNECTION:    pgsql
      DB_HOST:          db
      DB_PORT:          5432
      DB_DATABASE:      ${DB_DATABASE:-smia_gamlp}
      DB_USERNAME:      ${DB_USERNAME:-smia_user}
      DB_PASSWORD:      ${DB_PASSWORD:-smia_secret}
      JWT_SECRET:       ${JWT_SECRET}
      CACHE_DRIVER:     redis
      QUEUE_CONNECTION: redis
      REDIS_HOST:       redis
    volumes:
      - ./backend:/var/www/html
      - smia_backend_vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smia_net

  # ─────────────────────────────────────────────
  # Frontend — Angular 17 (build prod)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: smia_frontend
    restart: unless-stopped
    volumes:
      - smia_frontend_dist:/app/dist
    environment:
      NODE_ENV: production
      API_URL:  http://nginx/api
    networks:
      - smia_net

  # ─────────────────────────────────────────────
  # Servidor Web — Nginx (reverse proxy)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: smia_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/smia.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
      - smia_frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - smia_net

  # ─────────────────────────────────────────────
  # Redis — caché y colas Laravel
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smia_redis
    restart: unless-stopped
    networks:
      - smia_net

volumes:
  smia_pgdata:
  smia_backend_vendor:
  smia_frontend_dist:

networks:
  smia_net:
    driver: bridge
